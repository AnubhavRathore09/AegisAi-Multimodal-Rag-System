# RAG System Configuration

app:
  name: AegisAI Multimodal RAG
  version: 1.0

retriever:
  type: faiss
  top_k: 5

database:
  type: mongodb
  collection: documents

llm:
  provider: groq
  model: llama3-70b

memory:
  enabled: true
  max_history: 5

upload:
  allowed_types: ["pdf", "txt", "image"]
